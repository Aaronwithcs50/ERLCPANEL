openapi: 3.0.3
info:
  title: ERLCPANEL API
  version: 1.0.0
servers:
  - url: http://localhost:3000
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - service
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: erlcpanel
  /api/v1/ping:
    get:
      summary: Ping endpoint
      responses:
        '200':
          description: Pong response
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
                    enum: [pong]
